<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up form</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="signup.css">
    <script src="signup.js"></script>
<body>
    <div class="form-container">
        <div class="form-header">
            <h2>Create Account</h2>
            <p>Join our community and get started today</p>
        </div>
        <form action="create.php" method="POST" id="signupForm" onsubmit="return validateForm(event)">
            <fieldset>
                <legend>Personal Information</legend>

                <div class="form-group">
                    <label for="firstname">First Name</label>
                    <input type="text" id="firstname" name="firstname" placeholder="John" required>
                </div>

                <div class="form-group">
                    <label for="lastname">Last Name</label>
                    <input type="text" id="lastname" name="lastname" placeholder="Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <span class="input-hint">Minimum 6 characters required</span>
                </div>

                <div class="gender-group">
                    <span class="gender-label">Gender</span>
                    <div class="radio-option">
                        <input type="radio" id="male" name="gender" value="Male" required>
                        <label for="male">Male</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="female" name="gender" value="Female" required>
                        <label for="female">Female</label>
                    </div>
                </div>
            </fieldset>

            <div class="button-group">
                <button type="submit" name="submit" href = "create.php">Sign Up</button>
                <button type="button" onclick="document.getElementById('signupForm').reset()">Reset</button>
            </div>
    </div>
    </form>
    </div>
</body>

</html>
